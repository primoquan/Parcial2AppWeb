<div class="perfil-container">
  <div class="perfil-wrapper">
    <div class="perfil-card">

      <div class="perfil-header">
        <h2>{{ modoEdicion ? 'Actualizar Perfil' : 'Crear Perfil' }}</h2>
        <button class="btn-logout" (click)="cerrarSesion()">Cerrar Sesión</button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" formControlName="nombre"
            placeholder="Ingresa tu nombre"
            [class.input-error]="form.get('nombre')?.invalid && form.get('nombre')?.touched" />
          <span class="error-text" *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
            El nombre es obligatorio
          </span>
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input id="apellido" type="text" formControlName="apellido"
            placeholder="Ingresa tu apellido"
            [class.input-error]="form.get('apellido')?.invalid && form.get('apellido')?.touched" />
          <span class="error-text" *ngIf="form.get('apellido')?.invalid && form.get('apellido')?.touched">
            El apellido es obligatorio
          </span>
        </div>

        <div class="form-group">
          <label for="edad">Edad</label>
          <input id="edad" type="number" formControlName="edad"
            placeholder="Ingresa tu edad"
            [class.input-error]="form.get('edad')?.invalid && form.get('edad')?.touched" />
          <span class="error-text" *ngIf="form.get('edad')?.invalid && form.get('edad')?.touched">
            Ingresa una edad válida
          </span>
        </div>

        <div class="form-group">
          <label for="correo">Correo</label>
          <input id="correo" type="email" formControlName="correo"
            placeholder="ejemplo@correo.com"
            [class.input-error]="form.get('correo')?.invalid && form.get('correo')?.touched" />
          <span class="error-text" *ngIf="form.get('correo')?.invalid && form.get('correo')?.touched">
            Ingresa un correo válido
          </span>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono (8 dígitos)</label>
          <input id="telefono" type="text" formControlName="telefono"
            placeholder="Ej: 55551234" maxlength="8"
            [class.input-error]="form.get('telefono')?.invalid && form.get('telefono')?.touched" />
          <span class="error-text" *ngIf="form.get('telefono')?.invalid && form.get('telefono')?.touched">
            El teléfono debe tener exactamente 8 dígitos
          </span>
        </div>

        <div class="success-msg" *ngIf="mensajeExito">{{ mensajeExito }}</div>
        <div class="error-msg"   *ngIf="mensajeError">{{ mensajeError }}</div>

        <button type="submit" [disabled]="cargando">
          {{ cargando ? 'Guardando...' : (modoEdicion ? 'Actualizar' : 'Guardar') }}
        </button>

      </form>
    </div>

    <footer class="login-footer">
      Creado por Luis Quan | Parcial 2 | Aplicaciones Web
    </footer>
  </div>
</div>
