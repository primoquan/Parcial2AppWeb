//Pagina para nuestro login

<div class="login-container">
    <div class="login-card">
      <h2>Iniciar Sesión</h2>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label for="usuario">Usuario o Correo</label>
          <input
            id="usuario"
            type="text"
            formControlName="usuario"
            placeholder="Ingresa tu usuario o correo"
            [class.input-error]="form.get('usuario')?.invalid && form.get('usuario')?.touched"
          />
          <span class="error-text" *ngIf="form.get('usuario')?.invalid && form.get('usuario')?.touched">
            Este campo es obligatorio
          </span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Ingresa tu contraseña"
            [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <span class="error-text" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            Este campo es obligatorio
          </span>
        </div>

        <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

        <button type="submit" [disabled]="cargando">
          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </button>

      </form>
    </div>
  </div>

  <footer class="login-footer">
    Creado por Luis Quan | Parcial 2 | Aplicaciones Web
  </footer>
